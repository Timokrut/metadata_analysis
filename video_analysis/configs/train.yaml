dataset:
  # Корень FF++, содержит подпапки: DeepFakeDetection, Deepfakes, Face2Face, FaceShifter, FaceSwap, NeuralTextures, original, csv
  dataset_root: data/ffpp/FaceForensics++_C23
  manipulations_include: null        # null => все, кроме 'original'
  original_dir: original
  data_mode: videos                  # videos | images
  crops_cache_dir: data/ffpp_crops
  video_exts: [".mp4", ".avi", ".mov", ".mkv", ".webm"]
  frames_per_video: 12
  faces_per_frame: 1
  face_pad: 0.20
  min_face_size: 48

input:
  image_size: 256
  mean: 0.5
  std: 0.5

split:
  val_ratio: 0.1
  test_ratio: 0.1
  random_seed: 42
  use_csv_splits: true

train:
  batch_size: 32
  num_workers: 2
  use_pos_weight: true
  optimizer: adamw          # adamw | sgd
  lr: 3.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine         # cosine | plateau | null
  epochs: 20
  early_stop_patience: 5
  amp: true

paths:
  out_dir: outputs/mesonet
  checkpoints_dir: checkpoints
  logs_dir: logs
