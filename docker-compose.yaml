services:
  metadata-analysis:
    build: ./metadata_analysis
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload 
    expose: 
      - "8000"
    networks:
      - common_network
    volumes:
      - shared_data:/shared_data
      # - ./metadata_analysis:/app 
    environment:
      SHARED_DATA_PATH: /shared_data
    restart: always

  video-analysis:
    build: ./video_analysis 
    command: uvicorn server:app --host 0.0.0.0 --port 8888 --reload
    expose: 
      - "8888"
    networks:
      - common_network
    volumes:
      - shared_data:/shared_data
      - ./video_analysis:/app 
    restart: always
    environment: 
      SHARED_DATA_PATH: /shared_data
      ENABLE_CLIP: 0
  audio-analysis:
    build: ./audio_analysis 
    command: python app.py
    expose: 
      - "5000"
    networks:
      - common_network
    volumes:
      - shared_data:/shared_data
      # - ./audio_analysis:/app
    environment: 
      SHARED_DATA_PATH: /shared_data

  decision_block: 
    build: ./decision_block
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    volumes:
      - shared_data:/shared_data
      - ./decision_block:/app
    networks:
      - common_network
    environment: 
      META_LINK: http://metadata-analysis:8000
      VIDEO_LINK: http://video-analysis:8888 
      AUDIO_LINK: http://audio-analysis:5000 
      SHARED_DATA_PATH: /shared_data
    expose: 
      - "8003"
    restart: always
    depends_on: 
      - metadata-analysis 
      - video-analysis
      - audio-analysis

volumes:
  shared_data:

networks:
  common_network:
    external: true 
